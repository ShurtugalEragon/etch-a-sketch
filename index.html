<!DOCTYPE html>
<html>
    <head>
        <script src="utility.js"></script>
        <title>Etch-A-Sketch</title>
        <style>
            #parent {
                display: flex;
                flex-wrap:wrap;
                height: 70vh;
                margin: 5vh 10vw 10vh 10vw;
                border-color: black;
                border-style: solid;
            }
            .child {
                background-color: white;
                margin: 0px;
            }
            .activeColor {
                background-color: red;
            }
            #changeButton {
                display: flex;
                align-items: center;
                flex-direction: column;
            }
        </style>
    </head>
    
    <body>
        <div id="changeButton">
            <h1>Etch-A-Sketch</h1>
            <button onclick="changeGrid()">Change grid size</button>
        </div>
        
        <div id="parent">
            <script>
                createGrid(16);
            </script>
        </div>
    </body>
</html>
