<!DOCTYPE html>
<html>
    <head>
        <title>Etch-A-Sketch</title>
        <style>
            .parent {
                display: flex;
                flex-wrap:wrap;
                height: 70vh;
                padding: 10vh 10vw 10vh 10vw;
            }
            .child {
                height: 100% / 16;
                background-color: black;
                margin: 0px;
                width: calc(100% / 16);
            }
            .activeColor {
                background-color: red;
            }
        </style>
    </head>
    
    <body>
        <div class="parent">
            <script>
                const parentDiv = document.querySelector("div.parent");

                for (let i = 0; i < 16; ++i) {
                    for (let j = 0; j < 16; ++j) {
                        const block = document.createElement("div");
                        block.className = "child";
                        const id = `${i},${j}`;
                        block.id = id;

                        block.addEventListener("mouseenter", (e) => {
                            document.getElementById(id).classList.add("activeColor");
                        });
                        block.addEventListener("mouseleave", (e) => {
                            setTimeout(() => {
                                document.getElementById(id).classList.remove("activeColor");
                            }, 2000);
                        });

                        parentDiv.appendChild(block);
                    }
                }
            </script>
        </div>
    </body>
</html>
